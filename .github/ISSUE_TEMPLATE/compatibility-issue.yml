name: Report a compatibility issue
description: Report a setup problem with API NODE and an OpenAI-compatible client.
title: "Compatibility issue: "
labels: ["compatibility"]
body:
  - type: input
    id: tool
    attributes:
      label: Tool, SDK, or framework
      placeholder: "Cursor, Codex CLI, LangChain, Open WebUI..."
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: Model
      placeholder: "gpt-5.5"
    validations:
      required: false
  - type: input
    id: base_url
    attributes:
      label: Base URL
      placeholder: "https://apinode.pro"
    validations:
      required: false
  - type: textarea
    id: error
    attributes:
      label: Error message
      description: Paste the error with secrets removed.
      render: text
    validations:
      required: true
  - type: textarea
    id: redacted_config
    attributes:
      label: Redacted config
      description: Remove API keys, tokens, account IDs, and private URLs.
      render: text
    validations:
      required: false
