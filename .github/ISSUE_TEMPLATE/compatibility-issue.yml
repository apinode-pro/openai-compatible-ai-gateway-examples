name: Report a compatibility issue
description: Report a setup problem with API NODE and an OpenAI-compatible client.
title: "Compatibility issue: "
labels: ["compatibility"]
body:
  - type: input
    id: tool
    attributes:
      label: Tool, SDK, or framework
      placeholder: "Cursor, Claude Code, Codex CLI, LangChain, Open WebUI..."
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: Model
      placeholder: "gpt-5.5"
    validations:
      required: false
  - type: input
    id: base_url
    attributes:
      label: Base URL
      placeholder: "https://apinode.pro/v1"
    validations:
      required: false
  - type: dropdown
    id: api_mode
    attributes:
      label: API mode
      description: This helps separate Chat Completions problems from Responses API problems.
      options:
        - Chat Completions (/v1/chat/completions)
        - Responses API (/v1/responses)
        - Embeddings (/v1/embeddings)
        - Not sure
    validations:
      required: false
  - type: dropdown
    id: failure_type
    attributes:
      label: What failed?
      description: Pick the closest symptom so we can route the issue faster.
      options:
        - 401 / invalid API key
        - 404 / base_url or path issue
        - 429 / quota or rate limit
        - timeout / latency
        - model not found
        - streaming output
        - config not applied by the tool
        - other
    validations:
      required: false
  - type: textarea
    id: error
    attributes:
      label: Error message
      description: Paste the error with secrets removed.
      render: text
    validations:
      required: true
  - type: textarea
    id: redacted_config
    attributes:
      label: Redacted config
      description: Remove API keys, tokens, account IDs, and private URLs.
      render: text
    validations:
      required: false
  - type: textarea
    id: troubleshooting_done
    attributes:
      label: Checks already tried
      description: Optional, but useful when debugging 429s, timeouts, or path mismatches.
      placeholder: |
        - Confirmed base_url ends with /v1
        - Checked whether the tool uses Chat Completions or Responses API
        - Compared one direct provider request with one API NODE request
        - Captured request id / timestamp / upstream status if available
    validations:
      required: false
