name: Share a working config
description: Share a redacted setup that works with API NODE.
title: "Working config: "
labels: ["working-config"]
body:
  - type: input
    id: tool
    attributes:
      label: Tool, SDK, or framework
      placeholder: "Flowise, LangGraph, Deno, GitHub Actions..."
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Redacted working config
      description: Do not include API keys or private account details.
      render: text
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      placeholder: "Version, endpoint mode, streaming/non-streaming, caveats..."
    validations:
      required: false
